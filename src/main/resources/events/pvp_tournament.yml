# ╔══════════════════════════════════════════════════╗
# ║        Event: PvP Tournament                     ║
# ║        Tipo: timed + command_chain               ║
# ╚══════════════════════════════════════════════════╝

id: "pvp_tournament"
name: "Torneo PvP"
description: "Torneo de combate entre jugadores"
enabled: true
type: "timed"
channel: "1521276584299069491"

duration_minutes: 60

config:
  min_players: 4
  max_players: 16
  arena_world: "world"
  arena_center:
    x: 0
    y: 64
    z: 0
  arena_radius: 50
  elimination_mode: "last_standing"

start_commands:
  - "say ¡El Torneo PvP ha comenzado!"
  - "tp @a 0 64 0"
  - "effect give @a minecraft:absorption 60 1"

end_commands:
  - "say ¡El Torneo PvP ha terminado!"
  - "give %player_name% minecraft:diamond_block 4"

rewards:
  winner:
    commands:
      - "give %player_name% minecraft:netherite_helmet 1"
      - "give %player_name% minecraft:netherite_chestplate 1"
      - "give %player_name% minecraft:netherite_leggings 1"
      - "give %player_name% minecraft:netherite_boots 1"
    message: "¡Felicidades! Eres el campeon del torneo"
  runner_up:
    commands:
      - "give %player_name% minecraft:diamond_block 2"
    message: "Segundo lugar - Buen trabajo"

discord:
  start:
    title: "⚔️ Torneo PvP Iniciado"
    description: "¡El torneo ha comenzado! **{min_players}** a **{max_players}** jugadores"
    color: 16711680
    fields:
      - name: "⏱️ Duracion"
        value: "{duration} minutos"
        inline: true
      - name: "📍 Arena"
        value: "X: 0 Y: 64 Z: 0"
        inline: true
  end:
    title: "🏆 Torneo Finalizado"
    description: "**%player_name%** ha ganado el torneo!"
    color: 16766720
