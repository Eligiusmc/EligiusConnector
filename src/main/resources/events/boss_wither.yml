# ╔══════════════════════════════════════════════════╗
# ║        Event: Wither Boss                        ║
# ║        Tipo: mob_spawn + timed                   ║
# ╚══════════════════════════════════════════════════╝

id: "boss_wither"
name: "Wither Boss"
description: "Aparece un Wither que debes derrotar"
enabled: true
type: "mob_spawn"
channel: "1521276584299069491"

spawn:
  mob: "wither"
  custom_name: "⚔️ Shadow Knight"
  health: 200
  max_health: 200
  location:
    world: "world"
    x: 0
    y: 64
    z: 0
    radius: 100
  attributes:
    - name: "generic.max_health"
      base: 200
    - name: "generic.attack_damage"
      base: 10
    - name: "generic.movement_speed"
      base: 0.3

start_commands:
  - "say ¡Un Wither ha aparecido!"
  - "effect give @a minecraft:regeneration 30 1"

end_conditions:
  - type: "mob_killed"
    entity: "wither"
  - type: "timeout"
    minutes: 30

end_commands:
  - "say ¡El Wither ha sido derrotado!"

rewards:
  first_killer:
    commands:
      - "give %player_name% minecraft:netherite_sword 1"
    message: "¡Has derrotado al Wither! Recibe una espada de netherita"
  all_participants:
    commands:
      - "give %player_name% minecraft:experience_bottle 16"
    message: "Participacion en la derrota del Wither"

discord:
  start:
    title: "⚔️ Boss Spawned"
    description: "**Wither** ha aparecido!"
    color: 16711680
    thumbnail: "https://minotar.net/avatar/server/128"
    fields:
      - name: "❤️ Vida"
        value: "200/200"
        inline: true
      - name: "📍 Ubicacion"
        value: "X: {x} Y: {y} Z: {z}"
        inline: true
  end:
    title: "🎯 Boss Derrotado"
    description: "**Wither** fue derrotado por **%player_name%**!"
    color: 65280
    thumbnail: "https://minotar.net/avatar/%player_name%/128"
