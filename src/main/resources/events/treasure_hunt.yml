# ╔══════════════════════════════════════════════════╗
# ║        Event: Treasure Hunt                      ║
# ║        Tipo: command_chain                       ║
# ╚══════════════════════════════════════════════════╝

id: "treasure_hunt"
name: "Busqueda del Tesoro"
description: "Encuentra el tesoro escondido en el mundo"
enabled: true
type: "command_chain"
channel: "1521276584299069491"

# Ubicaciones del tesoro (se elige una al azar)
treasure_locations:
  - world: "world"
    x: 100
    y: 64
    z: 100
  - world: "world"
    x: -200
    y: 70
    z: 150
  - world: "world"
    x: 50
    y: 50
    z: -300

# Comandos de inicio
start_commands:
  - "say ¡Una busqueda del tesoro ha comenzado!"
  - "say ¡Busca el tesoro escondido en el mundo!"

# Comandos cuando alguien encuentra el tesoro
found_commands:
  - "say ¡{player} ha encontrado el tesoro!"
  - "give {player} minecraft:gold_block 8"

# Recompensas
rewards:
  finder:
    commands:
      - "give {player} minecraft:gold_block 8"
      - "give {player} minecraft:diamond 4"
    message: "¡Has encontrado el tesoro!"

# Pista (opcional)
hint:
  enabled: true
  interval_minutes: 10
  messages:
    - "El tesoro esta cerca del spawn"
    - "Busca en las montanas"
    - "El tesoro esta a nivel del mar"

# Embed de Discord
discord:
  start:
    title: "🗺️ Busqueda del Tesoro"
    description: "¡Una busqueda del tesoro ha comenzado!"
    color: 16766720
    fields:
      - name: "📍 Pista"
        value: "Busca en el mundo..."
        inline: false
  found:
    title: "💎 Tesoro Encontrado"
    description: "**{player}** ha encontrado el tesoro!"
    color: 16766720
    thumbnail: "https://minotar.net/avatar/{player}/128"
