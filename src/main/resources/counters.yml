# ╔══════════════════════════════════════════════════╗
# ║        EligiusConnector - Dynamic Counters       ║
# ║        Type: periodic | state                    ║
# ╚══════════════════════════════════════════════════╝

counters:
  # ── Periodic: updates every N seconds ─────────────
  online_players:
    type: periodic
    enabled: true
    channel: "1521280346585305268"
    format: "🟢 Jugadores: %server_online%"
    interval: 30

  all_members:
    type: periodic
    enabled: true
    channel: "1521280350343532654"
    format: "👥 all-members: %server_members%"
    interval: 300

  # ── State: updates when state changes ─────────────
  server_status:
    type: state
    enabled: true
    channel: "1521276573033173204"
    state_key: server_online
    states:
      online: "🟢 Online"
      offline: "🔴 Offline"

  # ── Example: disabled by default ──────────────────
