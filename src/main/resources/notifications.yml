# Notifications Configuration
# https://eligiusmc.github.io/EligiusConnector/config/notifications

Events:
  PlayerJoin:
    Enabled: true
    ChannelId: "your-channel-id"
    Message: ":arrow_right: **%player_displayname%** se ha conectado.\n:earth_africa: Mundo: %player_world%\n:busts_in_silhouette: Online: %playerlist_online%"
    MinecraftDisplay: "chat"

  PlayerLeave:
    Enabled: true
    ChannelId: "your-channel-id"
    Message: ":arrow_left: **%player_displayname%** se ha desconectado.\n:clock1: Tiempo jugado: %player_time_played%"
    MinecraftDisplay: "chat"

  PlayerDeath:
    Enabled: true
    ChannelId: "your-death-channel-id"
    Message: ":skull: **%player_displayname%** ha muerto.\n:droplet: Vida: %player_health%\n:bread: Comida: %player_food%"
    MinecraftDisplay: "chat"

  ServerStart:
    Enabled: true
    ChannelId: "your-server-channel-id"
    Message: ":white_check_mark: Servidor iniciado.\n:busts_in_silhouette: Jugadores online: %playerlist_online%"

  ServerStop:
    Enabled: true
    ChannelId: "your-server-channel-id"
    Message: ":x: Servidor apagándose..."

  ConsoleError:
    Enabled: true
    ChannelId: "your-console-channel-id"
    Message: ":warning: Error en consola:\n```\n{error}\n```"

  TPSLow:
    Enabled: true
    ChannelId: "your-performance-channel-id"
    Threshold: 15
    Message: ":warning: TPS bajo: {tps}"
