# ╔══════════════════════════════════════════════════╗
# ║        EligiusConnector - Player Events          ║
# ╚══════════════════════════════════════════════════╝

join:
  enabled: true
  channel: "1521276575889358960"
  embed:
    color: 5763719
    author: "%player_name% joined the server"
    author_icon: "https://minotar.net/avatar/%player_name%/128"
    thumbnail: "https://minotar.net/avatar/%player_name%/128"
    title: "Welcome to EligiusMC!"
    description: "Everyone say hello to **%player_name%**!"
    footer: "EligiusMC"
    timestamp: true
    fields:
      - name: "Online"
        value: "**%server_online%** / **%server_max_players%**"
        inline: true
      - name: "First Time"
        value: "%player_first_join%"
        inline: true

leave:
  enabled: true
  channel: "1521276575889358960"
  embed:
    color: 15548997
    author: "%player_name% left the server"
    author_icon: "https://minotar.net/avatar/%player_name%/128"
    thumbnail: "https://minotar.net/avatar/%player_name%/128"
    title: "See you soon!"
    description: "**%player_name%** has left. Come back anytime!"
    footer: "EligiusMC"
    timestamp: true
    fields:
      - name: "Online"
        value: "**%server_online%** / **%server_max_players%**"
        inline: true

death:
  enabled: true
  channel: "1521276578708066578"
  embed:
    color: 15548997
    author: "%player_name% died"
    author_icon: "https://minotar.net/avatar/%player_name%/128"
    thumbnail: "https://minotar.net/avatar/%player_name%/128"
    title: "{death_message}"
    footer: "EligiusMC"
    timestamp: true
    fields:
      - name: "Health"
        value: "❤️ %player_health% HP"
        inline: true
      - name: "Hunger"
        value: "🍖 %player_food% / 20"
        inline: true
      - name: "World"
        value: "🌍 %player_world%"
        inline: true

advancement:
  enabled: true
  channel: "1521276581522444350"
  embed:
    color: 16766720
    author: "Advancement Made!"
    author_icon: "https://minotar.net/avatar/%player_name%/128"
    thumbnail: "https://minotar.net/avatar/%player_name%/128"
    title: "{advancement}"
    description: "**%player_name%** has earned this advancement!"
    footer: "EligiusMC"
    timestamp: true
