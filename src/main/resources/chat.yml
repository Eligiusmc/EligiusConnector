channel: "1521272219223851028"

mc_to_discord: true
discord_to_mc: true

format:
  mc_to_discord: "{player}: {message}"
  discord_to_mc: "[DC] {player}: {message}"

webhooks:
  enabled: true
  name: "Minecraft"
  avatar: "https://minotar.net/avatar/{player}/128"

filters:
  spam:
    enabled: true
    max_messages: 5
    time_window_seconds: 10
    punishment:
      enabled: true
      levels:
        1: "mute:60"
        2: "mute:300"
        3: "tempban:3600"
        4: "banip"

  profanity:
    enabled: true
    words: []
    replacement: "*"
    punishment:
      enabled: true
      levels:
        1: "warn"
        2: "mute:300"
        3: "tempban:7200"

  links:
    enabled: true
    mode: "whitelist"
    domains:
      - "youtube.com"
      - "twitch.tv"
      - "clips.twitch.tv"
      - "github.com"
    punishment:
      enabled: true
      levels:
        1: "delete"
        2: "warn"
        3: "mute:300"

  caps:
    enabled: true
    max_percentage: 70
    min_length: 10
    punishment:
      enabled: true
      levels:
        1: "delete"
        2: "warn"
