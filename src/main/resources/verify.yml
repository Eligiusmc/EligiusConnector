channel: "1521272231068700702"

panel:
  embed:
    title: "🔐 Verifica tu Cuenta"
    description: "Vincula tu cuenta de Minecraft para desbloquear todas las funciones"
    color: "0x5865F2"
    author: "EligiusMC"
    footer: "Sigue los pasos"
    fields:
      - name: "📋 Como verificar"
        value: "1. Entra al servidor de Minecraft\n2. Escribe /verify en el chat\n3. Haz clic en Verificar abajo\n4. Ingresa el codigo"
        inline: false
      - name: "✨ Beneficios"
        value: "• Chat bridge MC ↔ Discord\n• Ver perfil e inventario"
        inline: false
  buttons:
    verify: true

code:
  length: 6
  expiry_minutes: 5
  character_set: "numeric"

sounds:
  enabled: true
  success:
    sound: "entity.player.levelup"
    volume: 1.0
    pitch: 1.0
  error:
    sound: "entity.villager.no"
    volume: 1.0
    pitch: 1.0

post_verify_commands:
  - "give %player_name% minecraft:diamond 1"
  - "say ¡%player_name% se ha verificado!"
  - "lp user %player_name% parent set default"

welcome_embed:
  enabled: true
  color: 5814783
  thumbnail: "https://minotar.net/avatar/server/128"
  author: "EligiusMC"
  author_icon: "https://minotar.net/avatar/EligiusMC/128"
  timestamp: true
  fields:
    - name: "📋 Como verificar"
      value: "1. Entra al servidor de Minecraft\n2. Escribe /verify en el chat\n3. Haz clic en Verificar abajo\n4. Ingresa el codigo"
      inline: false
    - name: "✨ Beneficios"
      value: "• Chat bridge MC ↔ Discord\n• Ver perfil e inventario"
      inline: false

messages:
  code_message: "&aUsa &e/verify <codigo> &aen el chat del servidor Minecraft para vincular tu cuenta."
  success_mc: "&a¡Cuenta vinculada exitosamente con Discord!"
  success_discord: "✅ You have been linked to Minecraft player {player}!"
  already_linked: "&cYa tienes una cuenta de Discord vinculada. Usa &e/unlink &cprimero."
