# ╔══════════════════════════════════════════════════╗
# ║        EligiusConnector - Configuration          ║
# ║        Config Version: 3                         ║
# ╚══════════════════════════════════════════════════╝

config_version: 3

# ==========================================
#  BOT CONFIGURATION
# ==========================================
bot:
  token: "${DISCORD_BOT_TOKEN}"
  server_id: "508152650978820096"
  status: "ONLINE"
  game_status:
    - "🎮 EligiusMC"
    - "🟢 {online} jugadores"
  update_interval_minutes: 1

# ==========================================
#  MODULES (Enable/Disable)
# ==========================================
modules:
  chat: true
  status: true
  join_leave: true
  deaths: true
  advancements: true
  verify: true
  console: true
  synchronization: true
  profile: true
  events: true

# ==========================================
#  DATABASE
# ==========================================
database:
  type: "sqlite"
  mysql:
    host: "localhost"
    port: 3306
    database: "eligiusconnector"
    username: "root"
    password: ""
    max_pool_size: 10
  redis:
    enabled: false
    host: "localhost"
    port: 6379
    password: ""
    database: 0

# ==========================================
#  LANGUAGE
# ==========================================
language: "es"

# ==========================================
#  AUDIT
# ==========================================
audit:
  enabled: true
  level: "info"
  retention_days: 30

# ==========================================
#  DEBUG
# ==========================================
debug: false
