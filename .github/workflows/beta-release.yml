name: Beta Release

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write

jobs:
  beta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Prepare gradle.properties for CI
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Get version from gradle.properties
        id: version
        run: |
          VERSION=$(grep "pluginVersion" gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "beta_version=${VERSION}-beta.$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Build with Gradle
        run: ./gradlew build shadowJar

      - name: Create Beta Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.beta_version }}
          name: "Beta v${{ steps.version.outputs.beta_version }}"
          body: "Beta release of EligiusConnector"
          prerelease: true
          files: build/libs/EligiusConnector-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Modrinth (Beta)
        if: success()
        env:
          MODRINTH_API_TOKEN: ${{ secrets.MODRINTH_API_TOKEN }}
          CHANNEL: Beta
        run: |
          sed -i "s/pluginVersion=.*/pluginVersion=${{ steps.version.outputs.beta_version }}/" gradle.properties
          ./gradlew modrinth --stacktrace

      - name: Publish to Hangar (Beta)
        if: success()
        env:
          HANGAR_API_TOKEN: ${{ secrets.HANGAR_API_TOKEN }}
          CHANNEL: Beta
        run: ./gradlew publishPluginPublicationToHangar --stacktrace
